<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1a1207"/>
    </linearGradient>
    <radialGradient id="heat1" cx="0.4" cy="0.5" r="0.35">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#ef4444" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="heat2" cx="0.7" cy="0.4" r="0.3">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#f97316" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="heat3" cx="0.55" cy="0.65" r="0.25">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <!-- Topographic contour lines -->
  <g fill="none" stroke="#f97316" stroke-width="1" opacity="0.12">
