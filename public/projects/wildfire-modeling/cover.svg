    <circle cx="500" cy="320" r="12"/><circle cx="500" cy="320" r="24"/><circle cx="720" cy="350" r="12"/><circle cx="720" cy="350" r="24"/>
  </g>
  <!-- Fire spread boundary (jagged polygon) -->
  <polygon points="320,280 380,230 450,250 520,220 580,260 630,240 680,280 720,260 760,300 790,340 770,390 730,420 680,440 620,450 560,430 500,440 440,410 380,380 340,340" fill="none" stroke="#ef4444" stroke-width="2" opacity="0.4" stroke-dasharray="8,4"/>
