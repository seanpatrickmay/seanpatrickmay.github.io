    <ellipse cx="750" cy="280" rx="280" ry="180"/>
    <ellipse cx="750" cy="280" rx="220" ry="140"/>
    <ellipse cx="750" cy="280" rx="160" ry="100"/>
    <ellipse cx="750" cy="280" rx="100" ry="60"/>
  </g>
  <!-- Heat map overlays -->
  <rect width="1200" height="675" fill="url(#heat1)"/>
  <rect width="1200" height="675" fill="url(#heat2)"/>
  <rect width="1200" height="675" fill="url(#heat3)"/>
  <!-- Data sensor points -->
  <g fill="#f97316">
    <circle cx="280" cy="250" r="4" opacity="0.8"/><circle cx="350" cy="380" r="4" opacity="0.6"/><circle cx="420" cy="200" r="4" opacity="0.7"/><circle cx="500" cy="320" r="5" opacity="0.9"/><circle cx="580" cy="410" r="4" opacity="0.7"/><circle cx="650" cy="260" r="4" opacity="0.8"/><circle cx="720" cy="350" r="5" opacity="0.9"/><circle cx="800" cy="200" r="4" opacity="0.6"/><circle cx="870" cy="430" r="4" opacity="0.7"/><circle cx="940" cy="300" r="4" opacity="0.8"/>
  </g>
