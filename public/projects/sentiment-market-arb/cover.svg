  <g>
    <line x1="720" y1="220" x2="720" y2="330" stroke="#22c55e" stroke-width="2" stroke-dasharray="4,3" opacity="0.7"/>
    <circle cx="720" cy="220" r="5" fill="#06b6d4"/><circle cx="720" cy="330" r="5" fill="#a855f7"/>
    <line x1="960" y1="170" x2="960" y2="290" stroke="#22c55e" stroke-width="2" stroke-dasharray="4,3" opacity="0.7"/>
