      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0c1220"/>
    </linearGradient>
    <linearGradient id="arbFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.02"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <!-- Grid -->
  <g stroke="#334155" stroke-width="0.5" opacity="0.15">
    <line x1="100" y1="80" x2="100" y2="600"/><line x1="200" y1="80" x2="200" y2="600"/><line x1="300" y1="80" x2="300" y2="600"/><line x1="400" y1="80" x2="400" y2="600"/><line x1="500" y1="80" x2="500" y2="600"/><line x1="600" y1="80" x2="600" y2="600"/><line x1="700" y1="80" x2="700" y2="600"/><line x1="800" y1="80" x2="800" y2="600"/><line x1="900" y1="80" x2="900" y2="600"/><line x1="1000" y1="80" x2="1000" y2="600"/><line x1="1100" y1="80" x2="1100" y2="600"/>
    <line x1="100" y1="130" x2="1100" y2="130"/><line x1="100" y1="200" x2="1100" y2="200"/><line x1="100" y1="270" x2="1100" y2="270"/><line x1="100" y1="340" x2="1100" y2="340"/><line x1="100" y1="410" x2="1100" y2="410"/><line x1="100" y1="480" x2="1100" y2="480"/><line x1="100" y1="550" x2="1100" y2="550"/>
  </g>
