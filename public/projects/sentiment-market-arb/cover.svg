  <line x1="100" y1="80" x2="100" y2="600" stroke="#475569" stroke-width="1.5"/>
  <!-- Polymarket line (upper, cyan) -->
  <polyline points="120,420 180,400 240,380 300,350 360,340 420,310 480,280 540,260 600,240 660,250 720,220 780,200 840,210 900,190 960,170 1020,160 1080,150" fill="none" stroke="#06b6d4" stroke-width="2.5" opacity="0.9"/>
  <!-- Kalshi line (lower, purple) -->
  <polyline points="120,460 180,450 240,440 300,420 360,410 420,390 480,370 540,350 600,340 660,350 720,330 780,310 840,330 900,310 960,290 1020,270 1080,260" fill="none" stroke="#a855f7" stroke-width="2.5" opacity="0.9"/>
  <!-- Arbitrage gap fill between lines -->
  <polygon points="120,420 180,400 240,380 300,350 360,340 420,310 480,280 540,260 600,240 660,250 720,220 780,200 840,210 900,190 960,170 1020,160 1080,150 1080,260 1020,270 960,290 900,310 840,330 780,310 720,330 660,350 600,340 540,350 480,370 420,390 360,410 300,420 240,440 180,450 120,460" fill="url(#arbFill)"/>
