<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1a1508"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <!-- Game tree -->
  <g stroke="#f59e0b" stroke-width="2" opacity="0.4">
    <!-- Level 0 to 1 -->
    <line x1="600" y1="80" x2="350" y2="200"/>
    <line x1="600" y1="80" x2="850" y2="200"/>
    <!-- Level 1 to 2 -->
    <line x1="350" y1="200" x2="200" y2="330"/>
    <line x1="350" y1="200" x2="500" y2="330"/>
    <line x1="850" y1="200" x2="700" y2="330"/>
    <line x1="850" y1="200" x2="1000" y2="330"/>
    <!-- Level 2 to 3 -->
    <line x1="200" y1="330" x2="130" y2="460"/>
    <line x1="200" y1="330" x2="270" y2="460"/>
    <line x1="500" y1="330" x2="430" y2="460"/>
    <line x1="500" y1="330" x2="570" y2="460"/>
    <line x1="700" y1="330" x2="630" y2="460"/>
    <line x1="700" y1="330" x2="770" y2="460"/>
    <line x1="1000" y1="330" x2="930" y2="460"/>
    <line x1="1000" y1="330" x2="1070" y2="460"/>
  </g>
  <!-- Highlighted optimal path -->
  <g stroke="#f59e0b" stroke-width="3.5" opacity="0.8">
    <line x1="600" y1="80" x2="350" y2="200"/>
    <line x1="350" y1="200" x2="500" y2="330"/>
    <line x1="500" y1="330" x2="430" y2="460"/>
  </g>
  <!-- Nodes -->
  <!-- Root -->
  <circle cx="600" cy="80" r="16" fill="#f59e0b"/>
  <!-- Level 1 -->
  <circle cx="350" cy="200" r="14" fill="#f59e0b" opacity="0.8"/>
  <circle cx="850" cy="200" r="14" fill="#475569"/>
  <!-- Level 2 -->
  <circle cx="200" cy="330" r="12" fill="#475569"/>
  <circle cx="500" cy="330" r="12" fill="#f59e0b" opacity="0.7"/>
  <circle cx="700" cy="330" r="12" fill="#475569"/>
  <circle cx="1000" cy="330" r="12" fill="#475569"/>
  <!-- Level 3 (leaf) -->
  <g fill="#334155">
    <circle cx="130" cy="460" r="10"/><circle cx="270" cy="460" r="10"/>
    <circle cx="570" cy="460" r="10"/><circle cx="630" cy="460" r="10"/>
    <circle cx="770" cy="460" r="10"/><circle cx="930" cy="460" r="10"/><circle cx="1070" cy="460" r="10"/>
  </g>
  <circle cx="430" cy="460" r="10" fill="#f59e0b" opacity="0.6"/>
  <!-- Regret values at leaf nodes -->
  <g font-family="monospace" font-size="14" text-anchor="middle" fill="#94a3b8" opacity="0.6">
    <text x="130" y="495">-0.3</text><text x="270" y="495">+0.1</text>
    <text x="430" y="495" fill="#f59e0b" opacity="1">+0.8</text><text x="570" y="495">-0.2</text>
    <text x="630" y="495">+0.4</text><text x="770" y="495">-0.5</text>
    <text x="930" y="495">+0.2</text><text x="1070" y="495">-0.1</text>
  </g>
  <!-- Convergence curve (bottom) -->
  <g transform="translate(200, 530)">
    <line x1="0" y1="100" x2="800" y2="100" stroke="#475569" stroke-width="1" opacity="0.3"/>
    <line x1="0" y1="0" x2="0" y2="100" stroke="#475569" stroke-width="1" opacity="0.3"/>
    <!-- Nash equilibrium line -->
    <line x1="0" y1="30" x2="800" y2="30" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
    <!-- Regret curve converging -->
    <polyline points="0,95 50,80 100,60 150,50 200,42 250,38 300,35 350,33 400,32 450,31 500,31 550,30 600,30 650,30 700,30 750,30 800,30" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.6"/>
  </g>
</svg>
