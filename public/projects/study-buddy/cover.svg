<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1a0f2e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <!-- Subtle grid -->
  <g stroke="#94a3b8" stroke-width="0.5" opacity="0.04">
    <line x1="60" y1="0" x2="60" y2="675"/><line x1="120" y1="0" x2="120" y2="675"/><line x1="180" y1="0" x2="180" y2="675"/><line x1="240" y1="0" x2="240" y2="675"/><line x1="300" y1="0" x2="300" y2="675"/><line x1="360" y1="0" x2="360" y2="675"/><line x1="420" y1="0" x2="420" y2="675"/><line x1="480" y1="0" x2="480" y2="675"/><line x1="540" y1="0" x2="540" y2="675"/><line x1="600" y1="0" x2="600" y2="675"/><line x1="660" y1="0" x2="660" y2="675"/><line x1="720" y1="0" x2="720" y2="675"/><line x1="780" y1="0" x2="780" y2="675"/><line x1="840" y1="0" x2="840" y2="675"/><line x1="900" y1="0" x2="900" y2="675"/><line x1="960" y1="0" x2="960" y2="675"/><line x1="1020" y1="0" x2="1020" y2="675"/><line x1="1080" y1="0" x2="1080" y2="675"/><line x1="1140" y1="0" x2="1140" y2="675"/>
  </g>
  <!-- Document (left side) -->
  <g transform="translate(120, 100)">
    <rect width="340" height="440" rx="16" fill="#1e293b" stroke="#334155" stroke-width="2"/>
    <!-- Document lines -->
    <g opacity="0.3">
      <rect x="30" y="40" width="200" height="8" rx="4" fill="#64748b"/>
      <rect x="30" y="65" width="280" height="6" rx="3" fill="#475569"/>
      <rect x="30" y="85" width="260" height="6" rx="3" fill="#475569"/>
      <rect x="30" y="105" width="240" height="6" rx="3" fill="#475569"/>
      <rect x="30" y="125" width="270" height="6" rx="3" fill="#475569"/>
      <rect x="30" y="155" width="180" height="8" rx="4" fill="#64748b"/>
      <rect x="30" y="180" width="280" height="6" rx="3" fill="#475569"/>
      <rect x="30" y="200" width="250" height="6" rx="3" fill="#475569"/>
      <rect x="30" y="220" width="270" height="6" rx="3" fill="#475569"/>
      <rect x="30" y="250" width="160" height="8" rx="4" fill="#64748b"/>
      <rect x="30" y="275" width="280" height="6" rx="3" fill="#475569"/>
      <rect x="30" y="295" width="230" height="6" rx="3" fill="#475569"/>
      <rect x="30" y="315" width="260" height="6" rx="3" fill="#475569"/>
      <rect x="30" y="335" width="200" height="6" rx="3" fill="#475569"/>
      <rect x="30" y="365" width="170" height="8" rx="4" fill="#64748b"/>
      <rect x="30" y="390" width="280" height="6" rx="3" fill="#475569"/>
    </g>
    <!-- Highlighted section -->
    <rect x="25" y="150" width="290" height="90" rx="8" fill="#8b5cf6" opacity="0.08" stroke="#8b5cf6" stroke-width="1" opacity="0.3"/>
  </g>
  <!-- Arrow from doc to chat -->
  <g stroke="#8b5cf6" stroke-width="2" opacity="0.3">
    <line x1="480" y1="300" x2="580" y2="300" stroke-dasharray="6,4"/>
    <polygon points="580,295 595,300 580,305" fill="#8b5cf6" opacity="0.3"/>
  </g>
  <!-- AI sparkles between doc and chat -->
  <g fill="#8b5cf6" opacity="0.4">
    <g transform="translate(530, 260)">
      <polygon points="0,-8 2,-2 8,0 2,2 0,8 -2,2 -8,0 -2,-2"/>
    </g>
    <g transform="translate(550, 340) scale(0.7)">
      <polygon points="0,-8 2,-2 8,0 2,2 0,8 -2,2 -8,0 -2,-2"/>
    </g>
    <g transform="translate(510, 310) scale(0.5)">
      <polygon points="0,-8 2,-2 8,0 2,2 0,8 -2,2 -8,0 -2,-2"/>
    </g>
  </g>
  <!-- Chat interface (right side) -->
  <g transform="translate(620, 100)">
    <rect width="440" height="440" rx="16" fill="#1e293b" stroke="#334155" stroke-width="2"/>
    <!-- Chat header -->
    <rect x="1" y="1" width="438" height="50" rx="16" fill="#334155" opacity="0.5"/>
    <!-- User message -->
    <g transform="translate(200, 80)">
      <rect width="210" height="60" rx="12" fill="#334155"/>
      <rect x="15" y="15" width="160" height="6" rx="3" fill="#94a3b8" opacity="0.5"/>
      <rect x="15" y="30" width="130" height="6" rx="3" fill="#94a3b8" opacity="0.5"/>
    </g>
    <!-- AI response -->
    <g transform="translate(20, 165)">
      <rect width="320" height="100" rx="12" fill="#8b5cf6" opacity="0.15" stroke="#8b5cf6" stroke-width="1" opacity="0.2"/>
      <rect x="15" y="15" width="260" height="6" rx="3" fill="#c4b5fd" opacity="0.4"/>
      <rect x="15" y="30" width="240" height="6" rx="3" fill="#c4b5fd" opacity="0.4"/>
      <rect x="15" y="45" width="200" height="6" rx="3" fill="#c4b5fd" opacity="0.4"/>
      <rect x="15" y="65" width="280" height="6" rx="3" fill="#c4b5fd" opacity="0.3"/>
      <rect x="15" y="80" width="160" height="6" rx="3" fill="#c4b5fd" opacity="0.3"/>
    </g>
    <!-- User follow-up -->
    <g transform="translate(240, 290)">
      <rect width="170" height="45" rx="12" fill="#334155"/>
      <rect x="15" y="15" width="120" height="6" rx="3" fill="#94a3b8" opacity="0.5"/>
    </g>
    <!-- AI response 2 -->
    <g transform="translate(20, 355)">
      <rect width="280" height="60" rx="12" fill="#8b5cf6" opacity="0.15" stroke="#8b5cf6" stroke-width="1" opacity="0.2"/>
      <rect x="15" y="15" width="220" height="6" rx="3" fill="#c4b5fd" opacity="0.4"/>
      <rect x="15" y="30" width="200" height="6" rx="3" fill="#c4b5fd" opacity="0.4"/>
    </g>
  </g>
</svg>
