<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1a0a0a"/>
    </linearGradient>
    <linearGradient id="cardFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <!-- Subtle grid -->
  <g stroke="#94a3b8" stroke-width="0.5" opacity="0.04">
    <line x1="60" y1="0" x2="60" y2="675"/><line x1="120" y1="0" x2="120" y2="675"/><line x1="180" y1="0" x2="180" y2="675"/><line x1="240" y1="0" x2="240" y2="675"/><line x1="300" y1="0" x2="300" y2="675"/><line x1="360" y1="0" x2="360" y2="675"/><line x1="420" y1="0" x2="420" y2="675"/><line x1="480" y1="0" x2="480" y2="675"/><line x1="540" y1="0" x2="540" y2="675"/><line x1="600" y1="0" x2="600" y2="675"/><line x1="660" y1="0" x2="660" y2="675"/><line x1="720" y1="0" x2="720" y2="675"/><line x1="780" y1="0" x2="780" y2="675"/><line x1="840" y1="0" x2="840" y2="675"/><line x1="900" y1="0" x2="900" y2="675"/><line x1="960" y1="0" x2="960" y2="675"/><line x1="1020" y1="0" x2="1020" y2="675"/><line x1="1080" y1="0" x2="1080" y2="675"/><line x1="1140" y1="0" x2="1140" y2="675"/>
  </g>
  <!-- Playing cards (fanned) -->
  <g transform="translate(150, 100)">
    <!-- Card 1: Ace of Spades -->
    <g transform="rotate(-12, 90, 180)">
      <rect x="10" y="20" width="160" height="220" rx="12" fill="url(#cardFace)" stroke="#cbd5e1" stroke-width="2"/>
      <text x="30" y="65" font-family="Georgia, serif" font-size="32" font-weight="bold" fill="#0f172a">A</text>
      <text x="30" y="95" font-family="Arial" font-size="28" fill="#0f172a">&#9824;</text>
      <text x="90" y="160" font-family="Arial" font-size="56" text-anchor="middle" fill="#0f172a">&#9824;</text>
    </g>
    <!-- Card 2: King of Hearts -->
    <g transform="rotate(-4, 90, 180)">
      <rect x="50" y="20" width="160" height="220" rx="12" fill="url(#cardFace)" stroke="#cbd5e1" stroke-width="2"/>
      <text x="70" y="65" font-family="Georgia, serif" font-size="32" font-weight="bold" fill="#dc2626">K</text>
      <text x="70" y="95" font-family="Arial" font-size="28" fill="#dc2626">&#9829;</text>
      <text x="130" y="160" font-family="Arial" font-size="56" text-anchor="middle" fill="#dc2626">&#9829;</text>
    </g>
    <!-- Card 3: face down -->
    <g transform="rotate(5, 90, 180)">
      <rect x="90" y="20" width="160" height="220" rx="12" fill="#1e293b" stroke="#475569" stroke-width="2"/>
      <rect x="100" y="30" width="140" height="200" rx="8" fill="none" stroke="#334155" stroke-width="1"/>
      <g fill="#334155" opacity="0.5">
        <circle cx="170" cy="130" r="30"/><circle cx="170" cy="130" r="20" fill="#1e293b"/>
      </g>
    </g>
  </g>
  <!-- Game tree (right side) -->
  <g stroke="#ef4444" stroke-width="1.5" opacity="0.5">
    <!-- Root -->
    <line x1="750" y1="120" x2="620" y2="240"/>
    <line x1="750" y1="120" x2="880" y2="240"/>
    <!-- Left branch -->
    <line x1="620" y1="240" x2="560" y2="360"/>
    <line x1="620" y1="240" x2="680" y2="360"/>
    <!-- Right branch -->
    <line x1="880" y1="240" x2="820" y2="360"/>
    <line x1="880" y1="240" x2="940" y2="360"/>
    <!-- Deeper -->
    <line x1="560" y1="360" x2="530" y2="460"/>
    <line x1="560" y1="360" x2="590" y2="460"/>
    <line x1="680" y1="360" x2="650" y2="460"/>
    <line x1="680" y1="360" x2="710" y2="460"/>
    <line x1="820" y1="360" x2="790" y2="460"/>
    <line x1="820" y1="360" x2="850" y2="460"/>
    <line x1="940" y1="360" x2="910" y2="460"/>
    <line x1="940" y1="360" x2="970" y2="460"/>
  </g>
  <!-- Tree nodes -->
  <g>
    <circle cx="750" cy="120" r="10" fill="#ef4444"/>
    <circle cx="620" cy="240" r="8" fill="#ef4444" opacity="0.7"/><circle cx="880" cy="240" r="8" fill="#ef4444" opacity="0.7"/>
    <circle cx="560" cy="360" r="6" fill="#ef4444" opacity="0.5"/><circle cx="680" cy="360" r="6" fill="#ef4444" opacity="0.5"/><circle cx="820" cy="360" r="6" fill="#ef4444" opacity="0.5"/><circle cx="940" cy="360" r="6" fill="#ef4444" opacity="0.5"/>
    <g fill="#fca5a5" opacity="0.4">
      <circle cx="530" cy="460" r="4"/><circle cx="590" cy="460" r="4"/><circle cx="650" cy="460" r="4"/><circle cx="710" cy="460" r="4"/><circle cx="790" cy="460" r="4"/><circle cx="850" cy="460" r="4"/><circle cx="910" cy="460" r="4"/><circle cx="970" cy="460" r="4"/>
    </g>
  </g>
  <!-- Alpha-beta pruning cut marks -->
  <g stroke="#fbbf24" stroke-width="3" opacity="0.6">
    <line x1="645" y1="350" x2="715" y2="370"/>
    <line x1="645" y1="370" x2="715" y2="350"/>
    <line x1="905" y1="350" x2="975" y2="370"/>
    <line x1="905" y1="370" x2="975" y2="350"/>
  </g>
  <!-- Chips (bottom left) -->
  <g transform="translate(100, 480)">
    <ellipse cx="50" cy="50" rx="40" ry="12" fill="#ef4444" opacity="0.6"/>
    <ellipse cx="50" cy="44" rx="40" ry="12" fill="#ef4444" opacity="0.7"/>
    <ellipse cx="50" cy="38" rx="40" ry="12" fill="#ef4444" opacity="0.8"/>
    <ellipse cx="120" cy="55" rx="35" ry="10" fill="#3b82f6" opacity="0.5"/>
    <ellipse cx="120" cy="49" rx="35" ry="10" fill="#3b82f6" opacity="0.6"/>
    <ellipse cx="120" cy="43" rx="35" ry="10" fill="#3b82f6" opacity="0.7"/>
  </g>
</svg>
